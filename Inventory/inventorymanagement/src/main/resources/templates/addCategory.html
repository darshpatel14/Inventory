<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Category</title>

    <style>

        .container{
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            width:400px;
            margin: 50px auto;
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }

        .input-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            font-weight:bold;
            margin-bottom:5px;
        }

        input, textarea{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        textarea{
            resize:none;
            height:80px;
        }

        input:focus, textarea:focus{
            border-color:#2980b9;
            outline:none;
        }

        button{
            width:100%;
            padding:12px;
            background:#27ae60;
            border:none;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#1e8449;
        }

    </style>

</head>

<body>

<!-- ✅ Fragment  th:fragment="categoryForm" -->
<div class="container" >

    <h2>Add Category</h2>

    <form th:action="@{/saveCategory}" th:object="${category}" method="post">

        <div class="input-group">
            <label>Category Name</label>
            <input type="text" th:field="*{categoryName}">
            <p th:if="${#fields.hasErrors('categoryName')}"
               th:errors="*{categoryName}" style="color:red"></p>
        </div>

        <div class="input-group">
            <label>Description</label>
            <textarea th:field="*{description}"></textarea>
            <p th:if="${#fields.hasErrors('description')}"
               th:errors="*{description}" style="color:red"></p>
        </div>

        <button type="submit">Add Category</button>

    </form>

</div>

</body>
</html>
