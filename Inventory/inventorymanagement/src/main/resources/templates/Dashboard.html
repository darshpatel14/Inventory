<!DOCTYPE html>

<script>
    function loadCategoryForm() {
        fetch('/addCategory')
            .then(response => response.text())
            .then(data => {
                document.getElementById('mainContent').innerHTML = data;
            })
            .catch(error => console.error('Error:', error));
    }
</script>
